<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>DBD Achievements — Sic4rioDragon</title>
  <meta name="description" content="Sic4rioDragon's Dead by Daylight achievements tracker for survivors, killers, and general achievements.">
  <meta name="theme-color" content="#07111d">

  <link rel="canonical" href="https://sic4riodragon.uk/deadbydaylight/achievements/">
  <link rel="stylesheet" href="./achievements.css">

  <link rel="icon" type="image/png" href="/deadbydaylight/assets/img/deadbydaylight_icon.png">
  <link rel="shortcut icon" href="/deadbydaylight/assets/img/deadbydaylight_icon.png">
  <link rel="apple-touch-icon" href="/deadbydaylight/assets/img/deadbydaylight_icon.png">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sic4rioDragon.uk">
  <meta property="og:title" content="Dead by Daylight • Achievements • Sic4rioDragon">
  <meta property="og:description" content="My Dead by Daylight achievements — survivors, killers, and general achievements.">
  <meta property="og:url" content="https://sic4riodragon.uk/deadbydaylight/achievements/">
  <meta property="og:image" content="https://sic4riodragon.uk/deadbydaylight/assets/img/banner1.png">
  <meta property="og:image:alt" content="Dead by Daylight banner featuring Yui and Huntress">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dead by Daylight • Achievements • Sic4rioDragon">
  <meta name="twitter:description" content="My Dead by Daylight achievements — survivors, killers, and general achievements.">
  <meta name="twitter:image" content="https://sic4riodragon.uk/deadbydaylight/assets/img/banner1.png">
</head>
<body>
  <div class="page-bg"></div>

  <main class="page-shell">
    <section class="hero">
      <a
        class="hero-art hero-art-left hero-art-link"
        href="/deadbydaylight/survivors.html"
        aria-label="Go to survivors page"
      >
        <img src="/deadbydaylight/assets/img/yui.png" alt="Yui Kimura">
      </a>

      <div class="hero-copy">
        <h1>Achievements</h1>
        <p class="subtitle">My Dead by Daylight achievements</p>

        <nav class="hero-nav" aria-label="Dead by Daylight">
          <a href="/deadbydaylight/">Home</a>
          <a href="/deadbydaylight/survivors.html">Survivors</a>
          <a href="/deadbydaylight/">Killers</a>
          <a href="/twitch/deadbydaylight/">Challenges</a>
          <a class="active" href="/deadbydaylight/achievements/">Achievements</a>
        </nav>
      </div>

      <a
        class="hero-art hero-art-right hero-art-link"
        href="/deadbydaylight/"
        aria-label="Go to killers page"
      >
        <img src="/deadbydaylight/assets/img/huntress.png" alt="The Huntress">
      </a>
    </section>

    <section class="toolbar card compact">
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Unlocked</span>
          <strong id="countUnlocked">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Locked</span>
          <strong id="countLocked">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Shown</span>
          <strong id="countShown">0</strong>
        </div>
      </div>

      <div class="toolbar-actions">
        <label class="search-wrap">
          <input id="searchInput" type="search" placeholder="Search achievements...">
        </label>

        <label class="select-wrap">
          <select id="filterSelect">
            <option value="all">All filters</option>
            <option value="killer">Killer only</option>
            <option value="survivor">Survivor only</option>
            <option value="general">General only</option>
            <option value="adept">Adept only</option>
            <option value="map">Map only</option>
            <option value="extra">Extra only</option>
            <option value="general-section">General section only</option>
          </select>
        </label>

        <label class="check">
          <input id="toggleUnlocked" type="checkbox">
          <span>Show all</span>
        </label>
      </div>
    </section>

    <section class="summary-grid">
      <details class="card mini-panel">
        <summary class="mini-head">
          <span>Killer summary</span>
          <span id="killerSummaryCounts">0 locked</span>
        </summary>
        <div id="killerSummary" class="summary-list mini-body"></div>
      </details>

      <details class="card mini-panel">
        <summary class="mini-head">
          <span>Survivor summary</span>
          <span id="survivorSummaryCounts">0 locked</span>
        </summary>
        <div id="survivorSummary" class="summary-list mini-body"></div>
      </details>

      <details class="card mini-panel">
        <summary class="mini-head">
          <span>General summary</span>
          <span id="generalSummaryCounts">0 locked</span>
        </summary>
        <div id="generalSummary" class="summary-list mini-body"></div>
      </details>
    </section>

    <section class="content-stack">
      <article class="card category-card">
        <div class="section-head">
          <h2>Killer achievements</h2>
        </div>
        <div id="killerSections" class="section-stack"></div>
      </article>

      <article class="card category-card">
        <div class="section-head">
          <h2>Survivor achievements</h2>
        </div>
        <div id="survivorSections" class="section-stack"></div>
      </article>

      <article class="card category-card">
        <div class="section-head">
          <h2>General achievements</h2>
        </div>
        <div id="generalSections" class="section-stack"></div>
      </article>
    </section>
  </main>

  <script src="./achievements.js"></script>
</body>
</html>
