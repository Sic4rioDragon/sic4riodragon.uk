<!doctype html>
<html lang="en">

<body>
  <div class="pageWrap">

    <header class="topHeader">
      <a class="backBtn" href="../">← Back to Home</a>

      <div class="titleWrap">
        <h1 class="pageTitle">Sic4rioDragon — Twitch</h1>
        <p class="pageSub">Stream hub, panels, and live embed</p>
      </div>

      <div class="headerActions">
        <a class="pillBtn" href="https://www.twitch.tv/Sic4rioDragon" target="_blank" rel="noopener">Open Twitch</a>
        <a class="pillBtn" href="./deadbydaylight/">DBD Requests</a>

    <main class="twitchLayout">
      <section class="twitchPlayerCard">
        <div class="twitchEmbed">
          <iframe
            id="twitchPlayer"
            src=""
            allowfullscreen

          If I'm live, the stream plays here. If I'm offline, Twitch will show offline.
        </div>
      </section>

      <section class="twitchAboutCard">
        <h2 class="sectionTitle">About Sic4rioDragon</h2>
        <div id="aboutText" class="aboutText"></div>
      </section>

      <section class="twitchPanelsCard">
        <h2 class="sectionTitle">Panels</h2>
        <div id="panelsGrid" class="panelsGrid"></div>
      </section>
    </main>

    <footer class="siteFooter">
      <div class="footerLeft">© Sic4rioDragon</div>
      <div class="footerRight">
        <a href="./deadbydaylight/">DBD Requests</a>
